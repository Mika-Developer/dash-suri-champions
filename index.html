<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Champions Suri - Dashboard Tempo Real</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            position: relative;
            background: url('https://lh3.googleusercontent.com/d/1009iyOQbvPprlEemN62ZAZnRgErtnKJU') center center / cover no-repeat;
            color: #ffffff;
        }

        .background-effects {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .gradient-mesh {
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background:
                radial-gradient(ellipse at 50% 100%, rgba(0, 120, 255, 0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 60%, rgba(0, 60, 180, 0.18) 0%, transparent 50%),
                radial-gradient(circle at 20% 30%, rgba(0, 180, 255, 0.10) 0%, transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(0, 180, 255, 0.10) 0%, transparent 40%);
            animation: meshMove 20s ease-in-out infinite alternate;
        }

        @keyframes meshMove {
            0%   { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(3%, 3%) rotate(2deg); }
        }

        .grid-overlay {
            position: absolute;
            width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* EPIC HEADER */
        .epic-header {
            text-align: center;
            padding: 60px 30px 40px;
            margin-bottom: 30px;
            position: relative;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .epic-header::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            width: 300px; height: 120px;
            background: radial-gradient(ellipse at center, rgba(0, 150, 255, 0.25) 0%, transparent 70%);
            transform: translateX(-50%);
            filter: blur(40px);
            z-index: -1;
        }

        .epic-header h1 {
            font-size: 68px;
            font-weight: 900;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #FFF 0%, #00D4FF 50%, #0080FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 80px rgba(0, 180, 255, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* MODE INDICATOR */
        .mode-indicator {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 12px 32px;
            background: rgba(0, 120, 255, 0.15);
            border: 2px solid rgba(0, 180, 255, 0.4);
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #00D4FF;
            box-shadow: 0 0 30px rgba(0, 180, 255, 0.3), inset 0 0 20px rgba(0, 180, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .mode-indicator::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            to { left: 100%; }
        }

        .mode-indicator .pulse-dot {
            width: 12px; height: 12px;
            background: #00FF88;
            border-radius: 50%;
            box-shadow: 0 0 12px #00FF88;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50%      { transform: scale(1.3); opacity: 0.7; }
        }

        /* PODIO */
        .podio-view {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 30px;
            gap: 0;
            min-height: 70vh;
        }

        .podio-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .podio-stage {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 40px;
            margin-top: 20px;
            max-width: 1400px;
        }

        .podio-section-title {
            font-size: 32px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #FFF 0%, #00D4FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 180, 255, 0.8);
        }

        .podio-player {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            animation: podioEntrance 0.8s ease-out;
        }

        @keyframes podioEntrance {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .podio-player.place-1 { animation-delay: 0.2s; }
        .podio-player.place-2 { animation-delay: 0s; }
        .podio-player.place-3 { animation-delay: 0.1s; }

        .podio-player .avatar-container {
            position: relative;
        }

        .podio-player .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,215,0,0.6);
            box-shadow: 0 8px 30px rgba(255,215,0,0.4);
        }

        .podio-player.place-1 .avatar {
            width: 160px;
            height: 160px;
            border-width: 5px;
            border-color: rgba(255,215,0,0.9);
            box-shadow: 0 12px 50px rgba(255,215,0,0.6);
        }

        .podio-player.place-2 .avatar {
            width: 130px;
            height: 130px;
            border-width: 4px;
            border-color: rgba(192,192,192,0.8);
            box-shadow: 0 10px 40px rgba(192,192,192,0.5);
        }

        .podio-player.place-3 .avatar {
            width: 120px;
            height: 120px;
            border-width: 4px;
            border-color: rgba(205,127,50,0.8);
            box-shadow: 0 10px 40px rgba(205,127,50,0.5);
        }

        .podio-medal {
            position: absolute;
            bottom: -8px;
            right: -8px;
            font-size: 48px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
        }

        .podio-player .podio-name {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            color: #FFF;
        }

        .podio-player.place-1 .podio-name {
            font-size: 24px;
        }

        .podio-player .podio-nickname {
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-style: italic;
        }

        .podio-player .podio-pts {
            font-size: 26px;
            font-weight: 800;
            color: #00FF88;
            text-shadow: 0 0 20px rgba(0,255,136,0.8);
        }

        .podio-player.place-1 .podio-pts {
            font-size: 32px;
        }

        .podio-pedestal {
            width: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            color: rgba(255,255,255,0.9);
            background: linear-gradient(180deg, rgba(0,120,255,0.3) 0%, rgba(0,60,120,0.5) 100%);
            border: 2px solid rgba(0,180,255,0.4);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,120,255,0.4);
            margin-top: 20px;
        }

        .podio-player.place-1 .podio-pedestal {
            height: 160px;
            width: 200px;
            font-size: 32px;
            background: linear-gradient(180deg, rgba(255,215,0,0.3) 0%, rgba(180,140,0,0.5) 100%);
            border-color: rgba(255,215,0,0.6);
            box-shadow: 0 12px 50px rgba(255,215,0,0.5);
        }

        .podio-player.place-2 .podio-pedestal {
            height: 130px;
            background: linear-gradient(180deg, rgba(192,192,192,0.3) 0%, rgba(130,130,130,0.5) 100%);
            border-color: rgba(192,192,192,0.6);
            box-shadow: 0 10px 40px rgba(192,192,192,0.4);
        }

        .podio-player.place-3 .podio-pedestal {
            height: 110px;
            background: linear-gradient(180deg, rgba(205,127,50,0.3) 0%, rgba(150,90,30,0.5) 100%);
            border-color: rgba(205,127,50,0.6);
            box-shadow: 0 10px 40px rgba(205,127,50,0.4);
        }

        /* TABLE */
        .table-view {
            display: none;
        }

        .table-view.active {
            display: block;
        }

        .info-banner {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .info-item {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            min-width: 200px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-label {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 28px;
            font-weight: 800;
            color: #00FF88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .content-wrapper {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
        }

        .table-container {
            flex: 1;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .table-header {
            display: flex;
            gap: 10px;
            padding: 16px 20px;
            background: rgba(0, 120, 255, 0.15);
            border-radius: 12px;
            margin-bottom: 15px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 180, 255, 0.3);
        }

        .header-pos { width: 50px; text-align: center; }
        .header-player { flex: 1; }
        .header-pts { width: 80px; text-align: center; }
        .header-time { width: 120px; text-align: center; }

        .table-row {
            display: flex;
            gap: 10px;
            padding: 18px 20px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            align-items: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .table-row:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
            border-color: rgba(0, 180, 255, 0.3);
            box-shadow: 0 4px 20px rgba(0, 180, 255, 0.2);
        }

        .row-pos {
            width: 50px;
            text-align: center;
            font-weight: 800;
            font-size: 20px;
            color: #00D4FF;
        }

        .row-player {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(0, 180, 255, 0.5);
            box-shadow: 0 4px 12px rgba(0, 180, 255, 0.3);
        }

        .player-info {
            display: flex;
            flex-direction: column;
        }

        .player-name {
            font-size: 16px;
            font-weight: 700;
            color: #FFF;
        }

        .player-nickname {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            font-style: italic;
        }

        .row-pts {
            width: 80px;
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            color: #00FF88;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.6);
        }

        .row-time {
            width: 120px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
        }

        .highlights-section {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .section-title {
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            color: #00D4FF;
            text-shadow: 0 0 20px rgba(0, 180, 255, 0.6);
        }

        .highlight-cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .highlight-card {
            flex: 1;
            min-width: 250px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
        }

        .highlight-card h3 {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
        }

        .highlight-player {
            display: flex;
            align-items: center;
            gap: 15px;
            justify-content: center;
        }

        .highlight-player img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgba(0, 180, 255, 0.5);
            box-shadow: 0 4px 15px rgba(0, 180, 255, 0.4);
        }

        .highlight-player div {
            text-align: left;
        }

        .highlight-name {
            font-size: 18px;
            font-weight: 700;
            color: #FFF;
        }

        .highlight-value {
            font-size: 20px;
            font-weight: 800;
            color: #00FF88;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.6);
        }

        .bottom-section {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
        }

        .ranking-times,
        .perigo-rebaixamento {
            flex: 1;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .time-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .time-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(0, 180, 255, 0.5);
        }

        .time-name {
            flex: 1;
            font-size: 15px;
            font-weight: 600;
            color: #FFF;
        }

        .time-pts {
            font-size: 18px;
            font-weight: 800;
            color: #00FF88;
            text-shadow: 0 0 12px rgba(0, 255, 136, 0.5);
        }

        .footer {
            text-align: center;
            padding: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-top: 40px;
        }

        .footer-text {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.5px;
        }

        .footer-highlight {
            color: #00D4FF;
            font-weight: 700;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 20px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-wrapper,
        .highlights-section,
        .bottom-section {
            animation: fadeIn 0.6s ease-out;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 1000;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 120, 255, 0.2);
            border: 2px solid rgba(0, 180, 255, 0.5);
            color: #FFF;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 120, 255, 0.4);
        }

        .control-btn:hover {
            background: rgba(0, 150, 255, 0.4);
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(0, 150, 255, 0.6);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        #contentContainer.fading {
            opacity: 0.3;
            transition: opacity 0.5s ease;
        }

        #contentContainer {
            opacity: 1;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

        <div class="gradient-mesh"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="container">
        <header class="epic-header">
            <h1>🏆 CHAMPIONS SURI 🏆</h1>

            <!-- PODIO SDR -->
            <div id="podioSDRView" class="podio-view" style="display:none;">

        </div>

        <footer class="footer">

                Dashboard atualizado em tempo real • 
                <span class="footer-highlight">Champions Suri 2025</span>
            </p>
        </footer>
    </div>

    <div class="controls">
        <button class="control-btn" id="pauseBtn" title="Pausar">⏸</button>
        <button class="control-btn" id="nextBtn" title="Próximo">⏭</button>
    </div>

    <script>

        const API_KEY = 'AIzaSyB6G_W22Od3HV2jVAh4h-BWs0_0pz6o-Vg';

        async function fetchSheetData(range) {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${range}?key=${API_KEY}`;
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`Erro ${response.status}`);
                const data = await response.json();
                return data.values || [];
            } catch (error) {
                console.error('Erro ao buscar dados:', error);
                return null;
            }
        }

        function parsePlayerData(rows, photoMap) {
            return rows.map(r => ({
                name: r[0] || '',
                nickname: r[1] || '',
                pts: parseFloat(r[2]) || 0,
                team: r[3] || '',
                photo: photoMap[r[0]] || ''
            })).sort((a, b) => b.pts - a.pts);
        }

        async function fetchPlayerData(mode) {
            const range = mode === 'closer' ? CLOSER_RANGE : SDR_RANGE;
            const photoMap = mode === 'closer' ? CLOSER_PHOTOS : SDR_PHOTOS;
            const rows = await fetchSheetData(range);
            if (!rows) return null;
            return parsePlayerData(rows, photoMap);
        }

        async function fetchMTDMetrics() {
            // Implementação futura se necessário
        }

        function updateModeIndicator() {
            const modeText = document.getElementById('modeText');
            if (currentMode === 'closer') {
                modeText.textContent = 'CLOSER';
            } else if (currentMode === 'sdr') {
                modeText.textContent = 'SDR';
            } else if (currentMode === 'podio-closer') {
                modeText.textContent = 'PÓDIO CLOSER';
            } else if (currentMode === 'podio-sdr') {
                modeText.textContent = 'PÓDIO SDR';
            }
        }

        function showPodioView() {
            document.getElementById('tableView').classList.remove('active');
            document.getElementById('podioCloserView').style.display = 'none';
            document.getElementById('podioSDRView').style.display = 'none';
        }

        function showTableView() {
            document.getElementById('tableView').classList.add('active');
            document.getElementById('podioCloserView').style.display = 'none';
            document.getElementById('podioSDRView').style.display = 'none';
        }

        function renderPodio() {
            if (currentMode === 'podio-closer') {
                document.getElementById('podioCloserView').style.display = 'flex';
                document.getElementById('podioSDRView').style.display = 'none';
                const top3 = cachedCloserPlayers.slice(0, 3);
                const stage = document.getElementById('podioCloserStage');
                stage.innerHTML = '';
                if (top3[1]) stage.appendChild(createPodioPlayer(top3[1], 2));
                if (top3[0]) stage.appendChild(createPodioPlayer(top3[0], 1));
                if (top3[2]) stage.appendChild(createPodioPlayer(top3[2], 3));
            } else if (currentMode === 'podio-sdr') {
                document.getElementById('podioCloserView').style.display = 'none';
                document.getElementById('podioSDRView').style.display = 'flex';
                const top3 = cachedSDRPlayers.slice(0, 3);
                const stage = document.getElementById('podioSDRStage');
                stage.innerHTML = '';
                if (top3[1]) stage.appendChild(createPodioPlayer(top3[1], 2));
                if (top3[0]) stage.appendChild(createPodioPlayer(top3[0], 1));
                if (top3[2]) stage.appendChild(createPodioPlayer(top3[2], 3));
            }
        }

        function createPodioPlayer(player, place) {
            const medals = { 1: '🥇', 2: '🥈', 3: '🥉' };
            const div = document.createElement('div');
            div.className = `podio-player place-${place}`;
            div.innerHTML = `
                <div class="avatar-container">
                    <img src="${player.photo}" alt="${player.name}" class="avatar">
                    <div class="podio-medal">${medals[place]}</div>
                </div>
                <div class="podio-name">${player.name}</div>
                <div class="podio-nickname">${player.nickname}</div>
                <div class="podio-pts">${player.pts.toFixed(1)} pts</div>
                <div class="podio-pedestal">${place}º Lugar</div>
            `;
            return div;
        }

        function updateTableHeaders() {
            document.getElementById('headerPts').textContent = 'PTS';
            document.getElementById('headerPts2').textContent = 'PTS';
            document.getElementById('headerTime').textContent = 'Time';
            document.getElementById('headerTime2').textContent = 'Time';
        }

        function updateTable(players) {
            const column1 = document.getElementById('tableColumn1');
            const column2 = document.getElementById('tableColumn2');
            if (!column1 || !column2 || !players) return;
            currentPlayers = players;

            let col1Players, col2Players;
            if (currentMode === 'closer') {
                col1Players = players.slice(0, 7);
                col2Players = players.slice(7);
            } else {
                const mid = Math.ceil(players.length / 2);
                col1Players = players.slice(0, mid);
                col2Players = players.slice(mid);
            }

            column1.innerHTML = renderTableRows(col1Players, 1);
            column2.innerHTML = renderTableRows(col2Players, col1Players.length + 1);

            updateDestaques(players);
            updateRankingTimes(players);
            updatePerigoRebaixamento(players);
        }

        function renderTableRows(players, startPos) {
            return players.map((p, i) => `
                <div class="table-row">
                    <div class="row-pos">${startPos + i}</div>
                    <div class="row-player">
                        <img src="${p.photo}" alt="${p.name}" class="player-avatar">
                        <div class="player-info">
                            <div class="player-name">${p.name}</div>
                            <div class="player-nickname">${p.nickname}</div>
                        </div>
                    </div>
                    <div class="row-pts">${p.pts.toFixed(1)}</div>
                    <div class="row-time">${p.team}</div>
                </div>
            `).join('');
        }

        function updateDestaques(players) {
            const container = document.getElementById('highlightsContainer');
            if (!container) return;
            const top = players[0];
            if (!top) return;
            container.innerHTML = `
                <div class="highlight-card">
                    <h3>🏆 Líder</h3>
                    <div class="highlight-player">
                        <img src="${top.photo}" alt="${top.name}">
                        <div>
                            <div class="highlight-name">${top.name}</div>
                            <div class="highlight-value">${top.pts.toFixed(1)} pts</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function updateRankingTimes(players) {
            const container = document.getElementById('rankingTimesContainer');
            if (!container) return;
            const teamMap = {};
            players.forEach(p => {
                if (!teamMap[p.team]) teamMap[p.team] = { pts: 0, players: [] };
                teamMap[p.team].pts += p.pts;
                teamMap[p.team].players.push(p);
            });
            const sorted = Object.keys(teamMap).map(t => ({
                name: t,
                pts: teamMap[t].pts,
                photo: teamMap[t].players[0].photo
            })).sort((a, b) => b.pts - a.pts);

            container.innerHTML = sorted.slice(0, 3).map(t => `
                <div class="time-item">
                    <img src="${t.photo}" alt="${t.name}" class="time-avatar">
                    <div class="time-name">${t.name}</div>
                    <div class="time-pts">${t.pts.toFixed(1)}</div>
                </div>
            `).join('');
        }

        function updatePerigoRebaixamento(players) {
            const container = document.getElementById('perigoContainer');
            if (!container) return;
            const bottom = players.slice(-3).reverse();
            container.innerHTML = bottom.map(p => `
                <div class="time-item">
                    <img src="${p.photo}" alt="${p.name}" class="time-avatar">
                    <div class="time-name">${p.name}</div>
                    <div class="time-pts">${p.pts.toFixed(1)}</div>
                </div>
            `).join('');
        }

        async function loadCurrentModeData() {
            if (currentMode === 'closer') {
                const players = await fetchPlayerData('closer');
                if (players) {
                    cachedCloserPlayers = players;
                    updateTable(players);
                }
            } else if (currentMode === 'sdr') {
                const players = await fetchPlayerData('sdr');
                if (players) {
                    cachedSDRPlayers = players;
                    updateTable(players);
                }
            }
        }

        async function switchModeWithTransition() {
            const cc = document.getElementById('contentContainer');

            const idx = MODE_SEQUENCE.indexOf(currentMode);
            currentMode = MODE_SEQUENCE[(idx + 1) % MODE_SEQUENCE.length];

            updateModeIndicator();

            cc.classList.add('fading');

            if (currentMode === 'podio-closer' || currentMode === 'podio-sdr') {
                showPodioView();
                await new Promise(r => setTimeout(r, 300));
                const cp = await fetchPlayerData('closer');
                const sp = await fetchPlayerData('sdr');
                if (cp) cachedCloserPlayers = cp;
                if (sp) cachedSDRPlayers = sp;
                await fetchMTDMetrics();
                renderPodio();
            } else {
                showTableView();
                updateTableHeaders();
                await new Promise(r => setTimeout(r, 300));
                await loadCurrentModeData();
            }

            cc.classList.remove('fading');
            if (!isPaused) scheduleNextSwitch();
        }

        function scheduleNextSwitch() {
            if (switchTimer) clearTimeout(switchTimer);
            const duration = MODE_DURATIONS[currentMode] || 45000;
            switchTimer = setTimeout(switchModeWithTransition, duration);
        }

        async function init() {
            updateModeIndicator();
            showTableView();
            await loadCurrentModeData();
            scheduleNextSwitch();
        }

        function autoRefresh() {
            setInterval(async () => {
                if (currentMode === 'closer' || currentMode === 'sdr') {
                    await loadCurrentModeData();
                } else if (currentMode === 'podio-closer' || currentMode === 'podio-sdr') {
                    const cp = await fetchPlayerData('closer');
                    const sp = await fetchPlayerData('sdr');
                    if (cp) cachedCloserPlayers = cp;
                    if (sp) cachedSDRPlayers = sp;
                    renderPodio();
                }
            }, 60000);
        }

        document.getElementById('pauseBtn').addEventListener('click', () => {
            isPaused = !isPaused;
            const btn = document.getElementById('pauseBtn');
            if (isPaused) {
                clearTimeout(switchTimer);
                btn.innerHTML = '▶';
                btn.title = 'Retomar';
            } else {
                btn.innerHTML = '⏸';
                btn.title = 'Pausar';
                scheduleNextSwitch();
            }
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            if (switchTimer) clearTimeout(switchTimer);
            switchModeWithTransition();
        });

        window.addEventListener('DOMContentLoaded', () => {
            init();
            autoRefresh();
        });
    </script>
